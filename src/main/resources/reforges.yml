# =============================================================================
#                       SkyBlockItems - Reforge System
# =============================================================================
# מערכת חישולים בסגנון Hypixel Skyblock
#
# פורמט הגדרת Reforge:
# reforges:
#   <id>:
#     display-name: "שם החישול"
#     item-types: [SWORD, BOW, ARMOR, etc.]
#     rarity-requirement: COMMON
#     rarity-upgrade: RARE
#     cost: 1000
#     stats:
#       mmoitems_attack_damage: 10
#     enchants:
#       - "SHARPNESS:5"
#     abilities:
#       - "ABILITY_ID"
#
# =============================================================================

settings:
  stat-format: "&#FAE8B8({value})"
  
reforges:
  starter:
    display-name: "&fStarter"
    item-types: ["SWORD", "AXE", "BOW", "ARMOR"]
    rarity-requirement: COMMON
    rarity-upgrade: NONE
    cost: 1000
    stats:
      mmoitems_attack_damage: 5
      mmoitems_defense: 5
    enchants: []
    abilities: []

  keen:
