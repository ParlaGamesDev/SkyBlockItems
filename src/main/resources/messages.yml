    applied-to: "<#f39c12>מתאים ל:"
    requirements: "<#f39c12>דרישות:"
    conflicts: "<#e74c3c>⚠ מתנגש עם:"
    status: "<#a29bfe>סטטוס: {status}"
    status-unlocked: "<#2ecc71>✔ פתוח"
    status-locked: "<#e74c3c>✖ נעול"
    req-level: " <#636e72>• <#74b9ff>רמת כישוף {level}"
    list-format: " <#636e72>• <#dfe6e9>{value}"

