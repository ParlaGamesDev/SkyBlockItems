    name: "<#a29bfe>רמה {level}"
    xp-cost: "<#636e72>עלות: <#2ecc71>{cost} נסיון"
    already-have: "<#e74c3c>✖ כבר יש לך את הרמה הזו!"
    need-xp: "<#e74c3c>✖ חסרים לך <#ffeaa7>{need} <#e74c3c>רמות נסיון"
    click-to-buy: "<#ffeaa7>▶ לחץ כדי לקנות!"
  
  # הגדרות תצוגה
  locked-enchant:
    material: "BARRIER"
    name: "<#e74c3c>&l✖ נעול: <#dfe6e9>{name}"
