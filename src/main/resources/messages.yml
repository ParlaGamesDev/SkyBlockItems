      - "<#636e72>{description}"
  
  conflict-lore: "<#e74c3c>✖ מתנגש עם: <#ffeaa7>{enchant}"
  max-level: "<#636e72>רמה מקסימלית: <#a29bfe>{max}"
  click-to-select-level: "<#ffeaa7>▶ לחץ כדי לבחור רמה!"
  need-enchanting-unlock: "<#e74c3c>✖ אתה צריך רמת Enchanting <#ffeaa7>{level} <#e74c3c>כדי להשתמש בזה!"

# ========================================
# מדריך הכישופים (Enchantment Guide)
# ========================================
guide:
  gui-title: "&8מדריך כישופים"
  
  # ניווט
  back: "<#e74c3c>◀ חזרה"
  previous-page: "<#2ecc71>◀ עמוד קודם"
  next-page: "<#2ecc71>עמוד הבא ▶"

  # כפתור פתיחת מדריך (בתפריט הראשי)
  open-guide:
    lore:
      - "<#636e72>לחץ כדי לפתוח את מדריך הכישופים"
      - "<#636e72>בו תוכל לראות את כל הכישופים"
      - "<#636e72>והפרטים המלאים עליהם"
  
  # חיפוש (Search)
  search:
    title: "<#f39c12>🔍 חיפוש כישוף"
    current: "<#f39c12>🔍 חיפוש: <#dfe6e9>{query}"
    lore:
      - "<#636e72>לחץ כדי לחפש כישוף לפי שם"
      - "<#e74c3c>לחיצה ימנית לביטול החיפוש"
    chat-prompt: "<#f39c12>הקש בצ'אט את שם הכישוף לחיפוש <#636e72>(או 'ביטול' לביטול):"
  
  # מיון (Sort)
  sort:
    title: "<#f39c12>⇅ מיון כישופים"
    left-click: "<#74b9ff>◖ לחיצה שמאלית להחלפת מיון!"
    right-click: "<#74b9ff>◗ לחיצה ימנית לאחורה!"
    modes:
      alphabetical-az: "אלפביתי A-Z"
      alphabetical-za: "אלפביתי Z-A"
      level-high-to-low: "רמה: גבוה לנמוך"
      level-low-to-high: "רמה: נמוך לגבוה"

  # לור של כישוף (Enchant Lore)
