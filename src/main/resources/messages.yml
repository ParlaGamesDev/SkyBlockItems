  upgrade-fail: "<#e74c3c>✖ כבר יש לך את הרמה הזו או גבוהה יותר!"
  too-expensive: "<#e74c3c>✖ יקר מדי! (מקסימום {max} רמות)"
  item-returned: "<#2ecc71>✔ החפץ הוחזר למלאי."
  info-label: "<#ffeaa7>&lמידע על כישופים"
