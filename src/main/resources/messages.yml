# ========================================
# תיאורי כישופים מפורטים (Detailed Descriptions)
# ========================================
enchant-descriptions:
  sharpness: "מגדיל את הנזק הכללי של החרב נגד כל סוגי האויבים והשחקנים."
  smite: "מגדיל משמעותית את הנזק הנגרם לאל-מתים (Undead) כמו זומבים ושלדים."
  bane_of_arthropods: "מגדיל את הנזק הנגרם לפרוקי רגליים כמו עכבישים ודגי כסף."
  fire_aspect: "מדליק את המטרה באש, מה שגורם לנזק מתמשך לאורך זמן."
  knockback: "הופך את המכות לחזקות יותר והודף את האויבים לאחור בחוזקה."
  looting: "מגדיל את הסיכוי לקבל שלל נדיר ואת כמות החפצים הנופלים ממובים."
  efficiency: "מגדיל את מהירות הכרייה של הכלי, מה שאפשר לשבור בלוקים מהר יותר."
  silk_touch: "מאפשר לכרות בלוקים במצבם המקורי (כמו זכוכית, דשא או גושי פחם)."
  fortune: "מגדיל את כמות המשאבים הנופלים מבלוקים (כמו יהלומים או פחם)."
  protection: "מפחית את רוב סוגי הנזק שהשחקן מקבל מכל מקור שהו."
  fire_protection: "מפחית משמעותית את הנזק מאש ולבה ומקצר את זמן הבעירה."
  blast_protection: "מפחית משמעותית את הנזק מפיפוצים (כמו TNT או קריפרים)."
  projectile_protection: "מפחית משמעותית את הנזק מחצים ומטענים שונים שנזרקים."
  thorns: "הופך את השריון שלך לקוצני ומחזיר חלק מהנזק לאויב שתוקף אותך."
  respiration: "מאפשר לנשום מתחת למים לזמן ארוך יותר ומשפר את הראות במים."
  aqua_affinity: "מבטל את האיטיות של הכרייה בזמן שאתה נמצא מתחת למים."
  feather_falling: "מפחית משמעותית את הנזק הנגרם מנפילה מגובה רב."
  depth_strider: "מאפשר לשחיעה ולנוע בחופשיות ובמהירות גבוהה בתוך מים."
  frost_walker: "הופך את המים שמתחת לרגליך לקרח, מה שמאפשר הליכה על מים."
  soul_speed: "מגדיל את מהירות התנועה שלך כשאתה הולך על חול נשמות."
  power: "מגדיל בצורה משמעותית את הנזק שעושים החצים שנורים מהקשת."
  punch: "הודף אויבים לאחור בעוצמה רבה כשהם נפגעים מהחצים שלך."
  flame: "הופך את החצים לבוערים, מה שמדליק את המטרה ומבשל בשר חיות."
  infinity: "מאפשר לירות חצים ללא הפסקה כל עוד יש לך חץ אחד לפחות בתיק."
  luck_of_the_sea: "מגדיל את הסיכוי למצוא אוצרות וחפצים נדירים בזמן דיג."
  lure: "מקצר את זמן ההמתנה עד שדג נתפס בחכה שלך."
  loyalty: "גורם לקלשון לחזור אליך אוטומטית ליד מיד לאחר שנזרק."
  impaling: "מגדיל את הנזק הנגרם ליצורי מים (כמו דגים או שומרים) עם הקלשון."
  channeling: "גורם לברק להכות במטרה בזמן סערה כשהקלשון פוגע בה."
  riptide: "משגר אותך קדימה בעוצמה כשאתה זורק את הקלשון בתוך מים או גשם."
  multishot: "מאפשר לירות שלושה חצים בבת אחת במחיר של חץ אחד בלבד."
  piercing: "גורם לחצים לעבור דרך האויב ולפגוע גם באלו שנמצאים מאחוריו."
  quick_charge: "מקטין את הזמן שנדרש כדי לטעון את רובה הקשת לפני הירייה."
  density: "מגדיל את הנזק הכללי שנגרם מנפילה עם המייס, ככל שנופלים מגובה רב יותר."
  breach: "מתעלם מחלק משריון האויב, מה שמאפשר להוריד להם יותר חיים."
  wind_burst: "יוצר פרץ רוח שמקפיץ אותך למעלה אחרי פגיעה מוצלחת באויב."
  unbreaking: "מפחית את הסיכוי שהחפץ יאבד מהעמידות שלו בזמן שימוש."
  mending: "מתקן את החפץ בעזרת נקודות הניסיון (XP) שאתה אוסף."
  health_boost: "מגדיל את כמות החיים המקסימלית שלך בזמן לבישת השריון."
  strength_boost: "מגדיל את כוח ההתקפה שלך, מה שמאפשר להוריד יותר חיים לאויבים במכות חרב ומייס."
  wisdom_boost: "משפר את החוכמה שלך, מה שמגדיל את כמות נקודות הניסיון (XP) שאתה מקבל ומשפר את ניהול המאנה."
  luck_boost: "משפר את המזל הכללי שלך, מה שמגדיל את הסיכויים לקבלת שלל נדיר ממובים ובזמן פעילויות שונות."
  toughness_boost: "מחזק את העמידות שלך ומפחית את הנזק שאתה סופג מהתקפות של אויבים שונים."
  crit_chance_boost: "מגדיל את הסיכוי שלך להנחית מכה קריטית (Critical Hit) שעושה הרבה יותר נזק מהרגיל."
  crit_damage_boost: "מגדיל את כמות הנזק הנוספת שנגרמת כאשר אתה מנחית מכה קריטית על אויב."
  regeneration_boost: "מאיץ את קצב התחדשות החיים שלך, מה שמאפשר לך להחלים ולחזור לקרב מהר יותר."
  speed_stat_boost: "מגדיל את מהירות התנועה הכללית שלך, מה שמאפשר לך לרוץ ולנווט בעולם במהירות רבה יותר."
  default-desc: "כישוף ייחודי המשדרג את הציוד שלך."

