    cost-lore: "<#636e72>עלות: <#2ecc71>{cost} נסיון"
    click-to-enchant: "<#ffeaa7>▶ לחץ כדי לכשף!"
    already-has-higher: "<#e74c3c>✖ כבר יש לך רמה גבוהה יותר!"
