name: SkyBlockItems
version: 1.2.0
main: dev.agam.skyblockitems.SkyBlockItems
api-version: '1.21'
softdepend: [MMOItems, MythicLib, AuraSkills, WorldGuard, PlaceholderAPI, ProtocolLib, NBTAPI, Vault]
authors: [Agam]
commands:
  sbi:
    description: Main plugin command
    permission: skyblockitems.sbi
  enchant:
    description: Opens the Enchanting GUI
    aliases: [et]
    permission: skyblock.enchant
  anvil:
    description: Opens the Custom Anvil GUI
    permission: skyblock.anvil
  reforge:
    description: Opens the Reforge GUI
    permission: skyblock.reforge
    aliases: [rf]
  rarity:
    description: Manage item rarities
    permission: skyblockitems.admin.rarity
