# Blacklist of blocks/objects that cannot be used in an enchantment table or anvil
# Items can be added via the command '/sbi blacklist add' while holding the item
blacklist: []

anvil:
  max-repair-cost: 40
  limit-enabled: true
  bypass-limits-on-op: true
  too-expensive-message: "&cיקר מדי!"
  search-limit: 25

enchanting:
  max-cost: 50
  limit-enabled: true
  bypass-limits-on-op: true

gui:
  main:
    title: "<#aa55ff>&lשולחן כישופים"
    size: 54
    item-slot: 4
    filler-material: PURPLE_STAINED_GLASS_PANE

  level-select:
    title: "&8בחירת רמה: {enchant}"
    size: 54
    back-slot: 49
    back-material: BARRIER
    filler-material: GRAY_STAINED_GLASS_PANE

  list:
    title: "<#aa55ff>&lרשימת כישופים"
    size: 54
    filler-material: PURPLE_STAINED_GLASS_PANE

  editor:
    title: "<#aa55ff>עורך: <#ffffff>{enchant}"
    size: 45
    filler-material: PURPLE_STAINED_GLASS_PANE

  stat-editor:
    title: "<#d455ff>&lעריכת נתונים (Stats)"
    size: 54
    filler-material: MAGENTA_STAINED_GLASS_PANE

  xp-editor:
    title: "<#55ff55>&lעריכת עלויות נסיון"
    size: 27
    filler-material: LIME_STAINED_GLASS_PANE

  target-selector:
    title: "<#ffff55>&lבחירת יעדים"
    size: 36
    filler-material: YELLOW_STAINED_GLASS_PANE

  conflict-selector:
    title: "&8בחירת התנגשויות"
    size: 54
    filler-material: RED_STAINED_GLASS_PANE

  guide:
    title: "&8מדריך כישופים"
    size: 54
    filler-material: LIGHT_BLUE_STAINED_GLASS_PANE

  anvil:
    title: "&8⚒ Anvil"
    size: 54
    filler-material: GRAY_STAINED_GLASS_PANE

  crafting:
    title: "&8Crafting Table"
    gui:
      filler: BLACK_STAINED_GLASS_PANE
      quick-craft-no-perm-lore:
        - "&7אפשרות זו חסומה."
        - "&7נדרשת הרשאת &eQuick Craft&7."
    messages:
      no-recipe: "&cמתכון לא נמצא"
      no-permission-quick-craft: "&cאין לך הרשאה לייצור מהיר!"
      insufficient-materials: "&cאין לך מספיק חומרים!"
      inventory-full: "&cהתיק שלך מלא!"
      crafted-item: "&aייצרת בהצלחה &f%item%&a!"


