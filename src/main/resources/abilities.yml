ability-header-format: "&7<gradient:#C40000:#FF0000:#FF9B00><bold>{ability}</gradient> &f{trigger}"

# --- יכולות מותאמות אישית (שלנו) ---
custom-abilities:
  POISON:
    name: "רעל עוצמתי"
    trigger: left_click
    description:
      - "&7מרעיל את המטרה בעוצמה <#FF8C42>{amplifier}&7, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7למשך <#DDA0DD>{duration} &7שניות רצופות, זמן המתנה של <#FF6B6B>{cooldown} &7שניות."

  LIGHTNING_ARROW:
    name: "חץ ברק"
    trigger: ON_ARROW_HIT
    description:
      - "&7בפגיעה החץ יזמן ברק גדול על האויב ועל כל"
      - "&7הסובבים אותו ברדיוס של <#7DCE82>6 &7בלוקים"
      - "&7ויגרום <#FF8C42>{damage} &7נזק, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7עם זמן המתנה של <#FF6B6B>{cooldown} &7שניות לאחר שימוש"

  EXPLOSIVE_ARROW:
    name: "חץ מתפוצץ"
    trigger: ON_ARROW_HIT
    description:
      - "&7הופך כל חץ שאתה יורה לחץ מתפוצץ ברדיוס <#7DCE82>10&7"
      - "&7בלוקים עולה <#5B9BD5>{mana} &7מאנה מפוצץ את המטרה"
      - "&7וגורם <#FF8C42>{damage} &7נזק, זמן המתנה של <#FF6B6B>{cooldown} &7שניות"

  EARTHQUAKE:
    name: "רעידת אדמה"
    trigger: SHIFT_RIGHT_CLICK
    description:
      - "&7מרעיד את האדמה ברדיוס <#7DCE82>{radius} &7ומעיף"
      - "&7אויבים בכוח <#FF8C42>{power}&7, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  SKY_SMASH:
    name: "נחיתת שמיים"
    trigger: SHIFT_RIGHT_CLICK
    description:
      - "&7מזניק אתכם לגובה של <#FFD700>10 &7בלוקים ועושה <#FF8C42>{power} &7נזק"
      - "&7בטווח של <#20BC24>{range} &7בלוקים, זמן המתנה לאחר השימוש הוא &c{cooldown} &7שניות."

  HEAL_BEAM:
    name: "קרן ריפוי"
    trigger: RIGHT_CLICK
    description:
      - "&7מחדש &a{damage} &7חיים לך ולכל"
      - "&7הסובבים ברדיוס &b{range}, זמן המתנה של &c{cooldown} שניות&7."

  SOLAR_REPAIR:
    name: "טעינה סולארית"
    trigger: SOLAR_STANCE
    charge-amount: 1.0
    charge-interval: 30
    max-charge: 120.0
    description:
      - "&7בעזרת אנרגיית השמש, הפריט צובר"
      - "&e+{damage} נזק &7בכל &b30 שניות&7."
      - "&7נזק שנצבר: &6{charge} נזק מתוך 120"
      - "&7המכה הבאה תשחרר את כל האנרגיה!"

  HAMMER:
    name: "פטיש חציבה"
    trigger: ON_BLOCK_BREAK
    description:
      - "&7חוצב שטח רחב של <#FFD700>3x3"
      - "&7בלוקים באופן מיידי, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  LASER:
    name: "לייזר חציבה"
    trigger: SHIFT_RIGHT_CLICK
    description:
      - "&7יורה קרן לייזר שחוצבת <#7DCE82>{damage} &7בלוקים בקו"
      - "&7ישר, זמן המתנה של <#FF6B6B>{cooldown} &7שניות."
      - "&7עולה <#5B9BD5>{mana} &7מאנה"

  MAGNET:
    name: "מגנט"
    trigger: RIGHT_CLICK
    description:
      - "&7ממגנט אליך את כל השלל שנפל ברדיוס"
      - "&7רחב של <#7DCE82>{radius} &7בלוקים."

  TREE_CAPITATOR:
    name: "כורת עצים"
    trigger: ON_BLOCK_BREAK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, כורת את <#FFD700>{damage} &7הבלוקים הראשונים"
      - "&7מהעץ, זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  BOOMERANG:
    name: "בומרנג"
    trigger: RIGHT_CLICK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, משליך את הפריט למרחק <#FFD700>{damage}"
      - "&7בלוקים וגורם <#FF8C42>{power} &7נזק למי שנפגע בדרך וחוזר לידך"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  HAWK_EYE:
    name: "עין הנץ"
    trigger: RIGHT_CLICK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה&7, מדגיש בלוקי &6Iron Ore &7ברדיוס"
      - "<#7DCE82>{power} &7למשך <#DDA0DD>15 &7שניות, זמן המתנה של <#FF6B6B>{cooldown} &7שניות."

  LUCKY_TREASURE:
    name: "אוצר מזל"
    trigger: ON_BLOCK_BREAK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, מעניק <#FF8C42>{damage}% &7סיכוי"
      - "&7לקבל את מה שחצבתם אבל פי <#00D6FF>{power}"

  DOUBLE_JUMP:
    name: "קפיצה כפולה"
    trigger: ON_JUMP
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, מאפשר"
      - "&7לבצע קפיצה נוספת באוויר"

  UNDERWATER_MASTER:
    name: "אדון המים"
    trigger: UNDERWATER
    description:
      - "&7מעניק נשימה, ראיית לילה ויכולת"
      - "&7שחייה מהירה במעמקי המים."

  OXYGEN_PURITY:
    name: "טוהר החמצן"
    trigger: UNDERWATER
    description:
      - "&7בעזרת &b{mana} מאנה&7, מאפשר נשימה עצמונית מתחת למים"
      - "&7לזמן בלתי מוגבל כלל, זמן המתנה של &c{cooldown} שניות&7."

  INFINITE_RESERVOIR:
    name: "מאגר מים אינסופי"
    trigger: PASSIVE
    description:
      - "&bמעיין החיים"
      - "&7» דלי המכיל בתוכו מים שלא נגמרים לעולם."
      - "&7» מאפשר שימוש אינסופי מבלי למלא מים מחדש."

  DOG_WHISTLE:
    name: "משרוקית חיות"
    trigger: RIGHT_CLICK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, משרוקית מיוחדת המשגרת אליך"
      - "&7מיידית את כל חיות המחמד שלך"
      - "&7(כלבים, חתולים, סוסים וכו')"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  RETALIATION_FREEZE:
    name: "נקמת הכפור"
    trigger: ON_HIT_TAKEN
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, סיכוי של <#FFD700>{power}%"
      - "&7להקפיא לחלוטין תוקפים למשך <#FF8C42>{damage} &7שניות"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  RETALIATION_LIGHTNING:
    name: "נקמת הברק"
    trigger: ON_HIT_TAKEN
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, סיכוי של <#FFD700>{power}% &7להכות"
      - "&7בתוקפים בברק קטלני הגורם <#FF8C42>{damage} &7נזק"

  WEB_SNARE:
    name: "מלכודת קורי עכביש"
    trigger: ON_ARROW_HIT
    description:
      - "&7עושה חץ שיוצר מלכודת קורי עכביש"
      - "&7בפגיעה למשך <#DDA0DD>{duration} &7שניות."
      - "&7עולה <#5B9BD5>{mana} &7מאנה, זמן ההמתנה הוא <#FF6B6B>{cooldown} &7שניות"

  FIRE_ARROW:
    name: "חץ אש"
    trigger: ON_ARROW_HIT
    description:
      - "&7הופך כל חץ שאתה יורה לחץ בוער בעוצמה <#FF8C42>{amplifier}&7"
      - "&7עולה <#5B9BD5>{mana} &7מאנה מצית את המטרה"
      - "&7למשך <#DDA0DD>{duration} &7שניות רצופות, זמן המתנה של <#FF6B6B>{cooldown} &7שניות"

  SLOWNESS_ARROW:
    name: "חץ האטה"
    trigger: ON_ARROW_HIT
    description:
      - "&7הופך כל חץ שאתה יורה לחץ מאט בעוצמה <#FF8C42>{amplifier}&7"
      - "&7עולה <#5B9BD5>{mana} &7מאנה מקפיא את המטרה"
      - "&7למשך <#DDA0DD>{duration} &7שניות רצופות, זמן המתנה של <#FF6B6B>{cooldown} &7שניות"

  MINERS_LUCK:
    name: "מזל של כורים"
    trigger: ON_BLOCK_BREAK
    description:
      - "&7מעניק &a{damage}% &7סיכוי לקבל &fנאגטס ברזל"
      - "&7בזמן חציבת אבן ו-Deepslate רגיל."

  THUNDER_STRIKE:
    name: "מכת ברק"
    trigger: RIGHT_CLICK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה מזמן מכת ברק אדירה שהורסת"
      - "&7את כל העץ בבת אחת, ללא מאמץ"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  CHARCOAL_CONVERTER:
    name: "ממיר פחם"
    trigger: ON_BLOCK_BREAK
    description:
      - "&7הופך כל גזע עץ שאתה חוצב ישירות"
      - "&7לפחם עץ באופן אוטומטי, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  BUTCHERS_BLADE:
    name: "להב הקצבים"
    trigger: ON_KILL
    description:
      - "&7סיכוי של <#FFE300>{damage}% &7להגדיל את כמות הבשר מחיות"
      - "&7פי &b{amplifier} &7מהרגיל, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  GOLDEN_LEAF:
    name: "עלה מוזהב"
    trigger: ON_BLOCK_BREAK
    description:
      - "&7מעניק <#FFE300>{damage}% &7סיכוי לקבל <#FFE300>תפוח מוזהב"
      - "&7בזמן חציבת עלים של עצים, עולה <#5B9BD5>{mana} &7מאנה"
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  # FLIGHT_SKILL removed by user request

  CROP_OVERDRIVE:
    name: "חקלאות מואצת"
    trigger: RIGHT_CLICK
    description:
      - "&7פריט חד פעמי המעניק &b10 שניות &7של"
      - "&7שתילה מחדש אוטומטית של כל יבול שתקצור."

  FARMER_AURA_WHEAT:
    name: "הילת חיטה"
    trigger: ON_SNEAK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, לחיצה על שיפט מגדלת באופן מיידי"
      - "&7את כל החיטה ברדיוס של <#FFD700>{radius} &7בלוקים."
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  FARMER_AURA_BEETROOT:
    name: "הילת סלק"
    trigger: ON_SNEAK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, לחיצה על שיפט מגדלת באופן מיידי"
      - "&7את כל הסלק ברדיוס של <#FFD700>{radius} &7בלוקים."
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  FARMER_AURA_CARROT:
    name: "הילת גזר"
    trigger: ON_SNEAK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, לחיצה על שיפט מגדלת באופן מיידי"
      - "&7את כל הגזר ברדיוס של <#FFD700>{radius} &7בלוקים."
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  FARMER_AURA_POTATO:
    name: "הילת תפוח אדמה"
    trigger: ON_SNEAK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, לחיצה על שיפט מגדלת באופן מיידי"
      - "&7את כל תפוחי האדמה ברדיוס של <#FFD700>{radius} &7בלוקים."
      - "&7זמן ההמתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  DIAMOND_RADAR:
    name: "רדאר יהלומים"
    trigger: RIGHT_CLICK
    description:
      - "&7סורק רדיוס של &b{radius} &7בלוקים ומשמיע"
      - "&7צפצוף במידה ונמצא יהלום בסביבה."

  CLEANSE:
    name: "טיהור"
    trigger: RIGHT_CLICK
    effects-to-remove:
      - "POISON"
      - "WITHER"
      - "SLOWNESS"
      - "WEAKNESS"
      - "BLINDNESS"
      - "NAUSEA"
      - "HUNGER"
      - "MINING_FATIGUE"
      - "LEVITATION"
      - "DARKNESS"
      - "BAD_OMEN"
      - "WIND_CHARGED"
      - "WEAVING"
      - "OOZING"
      - "INFESTED"
    description:
      - "&7מסיר מיידית את כל ההשפעות השליליות"
      - "&7ממך מבלי לפגוע בהשפעות הטובות"

  NIGHT_VISION_CHARM:
    name: "קמע ראיית לילה"
    trigger: "<#FFCF00><bold>הוטבר"
    description:
      - "&7כל עוד הפריט נמצא אצלכם בהוטבר"
      - "&7תקבלו ראיית לילה חזקה וקבועה"

  SLOW_METABOLISM:
    name: "הפחתת רעב"
    trigger: PASSIVE
    description:
      - "&7מפחית את קצב איבוד הרעב של השחקן"
      - "&7ב-&a{damage}% &7ומאפשר לשבוע לאורך זמן."

  SPEED:
    name: "מהירות"
    trigger: RIGHT_CLICK
    description:
      - "&7בעזרת <#5B9BD5>{mana} &7מאנה, מעניק &bספיד 4"
      - "&7למשך <#DDA0DD>{damage} &7שניות."
      - "&7זמן המתנה של <#FF6B6B>{cooldown} &7שניות."

  GRAPPLING_HOOK:
    name: "וו תפיסה"
    trigger: ON_ARROW_HIT
    description:
      - "&7יורה חץ מקשת וטס איתו עד"
      - "&7לנקודת הפגיעה. מונע נזק נפילה."
      - "&7זמן המתנה של <#FF6B6B>5.0 &7שניות."

# --- יכולות רגילות של MMOItems ---
abilities:
  lightning-beam:
    - "&7משגר קרן ברק עוצמתית שגורמת <#FF8C42>{damage} &7נזק"
    - "&7לכל האויבים בקו ישר. דורש <#5B9BD5>{mana} &7מאנה."
    - "&7זמן המתנה של <#FF6B6B>{cooldown} &7שניות"

  fireball:
    - "&7יורה כדור אש לוהט הגורם <#FF8C42>{damage} &7נזק"
    - "&7עולה <#5B9BD5>{mana} &7מאנה, זמן ההמתנה הוא <#FF6B6B>{cooldown} &7שניות"

  ice-crystal:
    - "&7משגר קריסטל קרח חד שגורם <#FF8C42>{damage} &7נזק"
    - "&7ומקפיא את המטרה למשך <#DDA0DD>{duration} &7שניות."
    - "&7עולה לשימוש <#5B9BD5>{mana} &7מאנה ועם זמן המתנה של <#FF6B6B>{cooldown} &7שניות"

  earthquake:
    - "&7מרעיד את האדמה בעוצמה וגורם &c{damage} &7נזק"
    - "&7לכל האויבים ברדיוס &e{radius} &7ממך."

  black-hole:
    - "&7בעזרת <#5B9BD5>{mana} &7מאנה יוצר חור שחור שמושך"
    - "&7אויבים למרכז למשך <#DDA0DD>{duration} &7שניות ברדיוס של <#7DCE82>{radius} &7בלוקים"
    - "&7זמן המתנה לאחר השימוש הוא <#FF6B6B>{cooldown} &7שניות"

  blizzard:
    - "&7מזמן סופת שלגים קפואה למשך &a{duration} &7שניות,"
    - "&7הגורמת &c{damage} &7נזק ומאיטה את האויבים."

  meteor:
    - "&7מזמן מטאור ענק מהשמיים שמתרסק,"
    - "&7וגורם &c{damage} &7נזק פיצוץ אדיר."

  smite:
    - "&7מכה את האויב באור קדוש וגורם &c{damage} &7נזק,"
    - "&7עם בונוס נזק נגד אל-מתים."

  ignite:
    - "&7מצית את האויב בלהבות וגורם לו לבעור"
    - "&7למשך &a{duration} &7שניות."

  corrupt:
    - "&7משחית את נשמת האויב וגורם &c{damage} &7נזק,"
    - "&7תוך כדי החלשת ההגנות שלו."

  wither:
    - "&7יורה גולגולת ווית'ר מתפרצת שגורמת"
    - "&7אפקט ריקבון ו-&c{damage} &7נזק."

  shock:
    - "&7מחשמל את המטרה בזרם חזק וגורם &c{damage} &7נזק,"
    - "&7משתק את האויב לרגע."

  blink:
    - "&7משתגר מיידית קדימה למרחק &a{range} &7בלוקים,"
    - "&7מאפשר מעבר דרך מכשולים."

