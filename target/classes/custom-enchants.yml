    targets: [ "ALL" ]
    max-level: 3
    levels:
      1: { xp-cost: 25 }
      2: { xp-cost: 50 }
      3: { xp-cost: 75 }
  GREED:
    enabled: true
    display-name: "&eGREED"
    description: "&7מביא לך 1-5 כסף כל כמה שניות"
    material: SUNFLOWER
    targets: [ "SWORD", "PICKAXE", "AXE", "SHOVEL", "HOE" ]
    max-level: 1
    xp-costs:
      1: 200
