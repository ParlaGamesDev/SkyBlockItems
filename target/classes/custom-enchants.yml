custom-enchants:
  SAVINGS:
    enabled: true
    display-name: "&6SAVINGS"
    description: "&7חוסך 50% מהמטבעות שלך במוות"
    material: SUNFLOWER
    targets: [ "ALL" ]
    max-level: 1
    xp-costs:
      1: 50
  MANA_EFFICIENCY:
    enabled: true
    display-name: "&bMANA EFFICIENCY"
    description: "&7מוריד 10% מאנה לשימוש לכל רמה"
    material: LAPIS_LAZULI
    targets: [ "SWORD", "BOW" ]
    max-level: 5
    levels:
      1: { xp-cost: 20 }
      2: { xp-cost: 40 }
      3: { xp-cost: 60 }
      4: { xp-cost: 80 }
      5: { xp-cost: 100 }
  CHRONOS:
    enabled: true
    display-name: "&dCHRONOS"
    description: "&7מוריד את זמן ההמתנה של יכולות בקצת"
    material: CLOCK
    targets: [ "SWORD", "BOW" ]
