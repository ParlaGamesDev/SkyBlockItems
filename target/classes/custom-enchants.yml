custom-enchants:
  FARMING_FORTUNE:
    enabled: true
    display-name: "&aFARMING FORTUNE"
    description: "&7סיכוי לקבל יבולים כפולים או משולשים"
    material: WHEAT
    targets: [ "HOE" ]
    max-level: 5
    levels:
      1: { xp-cost: 10 }
      2: { xp-cost: 20 }
      3: { xp-cost: 30 }
      4: { xp-cost: 40 }
      5: { xp-cost: 50 }
  TURBO_MINER:
    enabled: true
    display-name: "&eTURBO MINER"
    description: "&7+3 מהירות כרייה בכל רצף כרייה (עד 200 בלוקים)"
    material: NETHERITE_PICKAXE
    targets: [ "PICKAXE" ]
    max-level: 1
    levels:
      1: { xp-cost: 60 }
  EXP_GRINDER:
    enabled: true
    display-name: "&2EXP GRINDER"
    description: "&7סיכוי של 50% לקבל 30 XP כשחטפת מכה"
    material: EXPERIENCE_BOTTLE
    targets: [ "CHESTPLATE", "LEGGINGS", "BOOTS", "HELMET" ]
    max-level: 1
    levels:
      1: { xp-cost: 40 }
  BERSERK:
    enabled: true
    display-name: "&4BERSERK"
    description: "&7מסיר את כל הכישופים אך מגדיל את הנזק ב-50%"
    material: STONE_SWORD
    targets: [ "SWORD", "AXE" ]
    max-level: 1
    levels:
      1: { xp-cost: 100 }
  MONSTER_SOUL:
    enabled: true
    display-name: "&8MONSTER SOUL"
    description: "&7מקבל פי 10 מהנזק של המפלצת שהרגת למכה הקריטית הבאה"
    material: DIAMOND_SWORD
    targets: [ "SWORD", "AXE" ]
    max-level: 1
    levels:
      1: { xp-cost: 150 }

  REPLENISH:
    enabled: true
    display-name: "&aREPLENISH"
    description: "&7שותל יבולים מחדש אוטומטית (לא ניתן להשגה רגילה)"
    material: WHEAT_SEEDS
    targets: [ "HOE" ]
    max-level: 1
    obtainable: false
    levels:
      1: { xp-cost: 0 }
  HARVESTING:
    enabled: true
    display-name: "&eHARVESTING"
    description: "&7פורצ'ן לגרזן (עצים ויבולים)"
    material: PUMPKIN_SEEDS
    targets: [ "AXE" ]
    max-level: 5
    levels:
      1: { xp-cost: 15 }
      2: { xp-cost: 30 }
      3: { xp-cost: 45 }
      4: { xp-cost: 60 }
      5: { xp-cost: 75 }
  DELICATE:
    enabled: true
    display-name: "&7DELICATE"
    description: "&7מונע שבירת יבולים שלא גדלו עד הסוף"
    material: MELON_SEEDS
    targets: [ "HOE" ]
    max-level: 1
    levels:
      1: { xp-cost: 20 }
  TRAMPLE_GUARD:
    enabled: true
    display-name: "&6TRAMPLE GUARD"
    description: "&7מונע דריסת יבולים כשאתה הולך עליהם"
    material: BEETROOT_SEEDS
    targets: [ "BOOTS" ]
    max-level: 1
    levels:
      1: { xp-cost: 30 }

