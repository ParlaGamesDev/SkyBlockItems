# =============================================================================
#                       SkyBlockItems - Reforge System
# =============================================================================
# מערכת חישולים בסגנון Hypixel Skyblock
#
# פורמט הגדרת Reforge:
# reforges:
#   <id>:
#     display-name: "שם החישול (תומך בגרדיאנטים והקסים)"
#     item-types: [SWORD, BOW, PICKAXE, etc.]  # סוגי חפצים תואמים
#     rarity-requirement: COMMON                # דרישת נדירות מינימלית
#     rarity-upgrade: UNCOMMON                  # שדרוג נדירות שהחישול מעניק
#     cost: 10000                               # עלות בכסף (Vault)
#     stats:                                    # סטטיסטיקות לתוספת
#       mmoitems_<stat_name>: <value>          # סטטיסטיקות MMOItems
#       auraskills_<stat_name>: <value>        # סטטיסטיקות AuraSkills
#     enchants:                                 # כישופים להוספה
#       - "ENCHANT_NAME:LEVEL"
#     abilities:                                # יכולות להוספה
#       - "ABILITY_ID"
#
# סוגי פריטים נתמכים:
# SWORD, BOW, CROSSBOW, TRIDENT, MACE (נשקים)
# PICKAXE, AXE, SHOVEL, HOE (כלים)
# HELMET, CHESTPLATE, LEGGINGS, BOOTS (שריון)
# FISHING_ROD (חכת דיג)
# ALL/GLOBAL (כל הסוגים)
# =============================================================================

