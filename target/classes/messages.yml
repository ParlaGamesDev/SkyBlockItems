  water_speed: "מגדיל את מהירות השחייה והתנועה בתוך המים."

  # Custom Enchants
  savings: "שומר על אחוז מהכסף שלך בעת מוות."
  mana_efficiency: "מפחית את עלות המאנה של השימוש ביכולות."
  chronos: "מכווץ את הזמן ומפחית את ה-Cooldown של יכולות."
  farming_fortune: "מגדיל את הסיכוי לקצור יבולים כפולים ומשולשים."
  turbo_miner: "מעניק מהירות כרייה נוספת כשכורים ברצף."
  exp_grinder: "מעניק סיכוי לקבל נקודות ניסיון (XP) כשאתה נפגע."
  berserk: "נכנס לטירוף: מגדיל נזק משמעותית אך מבטל באפים חיוביים."
  monster_soul: "סופג את נשמת המפלצת כדי לחזק את המכה הבאה."
  guardian_mana: "יוצר מגן קסום המבוסס על המאנה שבזבזת."
  replenish: "שותל מחדש יבולים מיד לאחר הקצירה."
  harvesting: "מגדיל את כמות היבולים שמתקבלים מקציר (Fortune לגרזן)."
  trample_guard: "מונע הרס של שדות ויבולים כשדורכים עליהם."
  exp_share: "מעניק בונוס XP בעת כריית משאבים טבעיים."
  
  # 1.21 & Boost Enchants
  breach: "מתעלם מחלק משריון האויב, מה שמאפשר להוריד להם יותר חיים."
  density: "מגדיל את הנזק שנגרם מנפילה עם המייס."
  wind_burst: "יוצר פרץ רוח שמקפיץ אותך למעלה אחרי פגיעה."
  crit_chance_boost: "מגדיל את הסיכוי להנחית מכה קריטית."
  crit_damage_boost: "מגדיל את הנזק שנגרם ממכה קריטית."
  regeneration_boost: "מאיץ את קצב התחדשות החיים שלך."
  toughness_boost: "מחזק את העמידות שלך ומפחית נזק ספוג."

