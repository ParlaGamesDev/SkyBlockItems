# SkyBlockItems - הקונפיגורציה המרכזית
# כאן תוכלו להגדיר את כל ההגדרות הכלליות של הפלאגין.
# ======================================================

# ========================================
# הגדרות כלליות (General Settings)
# ========================================

# --- הגדרות קרב ---
# אם זה true, אביליטיז לא ישפיעו על שחקנים אחרים
disable-abilities-on-players: true

# אם זה true, אביליטיז לא ישפיעו על NPCs
disable-abilities-on-npcs: true

# ניתוב הודעות גלובלי (CHAT או ACTION_BAR)
message-routing: CHAT

# רשימה שחורה של בלוקים/חפצים שלא ניתן לכשף
# ניתן להוסיף חפצים דרך הפקודה /sbi blacklist add תוך כדי החזקת החפץ
blacklist: []

# ========================================
# הגדרות מערכת (System Settings)
# ========================================
anvil:
  max-repair-cost: 40
  limit-enabled: true
  bypass-limits-on-op: true
  too-expensive-message: "&cיקר מדי!"
  search-limit: 25

enchanting:
  max-cost: 50
  limit-enabled: true
  bypass-limits-on-op: true

# ========================================
# הגדרות GUI - ממשק המשתמש (GUI Settings)
# ========================================

gui:
  # ממשק הכישוף הראשי (Enchanting Table)
  main:
    title: "<#aa55ff>&lשולחן כישופים"
    size: 54
    item-slot: 4
    filler-material: PURPLE_STAINED_GLASS_PANE

  # ממשק בחירת רמה (Level Selection)
  level-select:
    title: "&8בחירת רמה: {enchant}"
    size: 54
    back-slot: 49
    back-material: BARRIER
    filler-material: GRAY_STAINED_GLASS_PANE

  # ממשק רשימת כישופים (Enchants List)
  list:
    title: "<#aa55ff>&lרשימת כישופים"
    size: 54
    filler-material: PURPLE_STAINED_GLASS_PANE

  # ממשק עורך כישוף (Enchant Editor)
  editor:
    title: "<#aa55ff>עורך: <#ffffff>{enchant}"
    size: 45
    filler-material: PURPLE_STAINED_GLASS_PANE

  # ממשק עריכת סטאטים (Stat Editor)
  stat-editor:
    title: "<#d455ff>&lעריכת נתונים (Stats)"
    size: 54
    filler-material: MAGENTA_STAINED_GLASS_PANE

  # ממשק עריכת עלויות XP
  xp-editor:
    title: "<#55ff55>&lעריכת עלויות נסיון"
    size: 27
    filler-material: LIME_STAINED_GLASS_PANE

  # ממשק בחירת יעדים (Target Selector)
  target-selector:
    title: "<#ffff55>&lבחירת יעדים"
    size: 36
    filler-material: YELLOW_STAINED_GLASS_PANE

  # ממשק בחירת התנגשויות (Conflict Selector)
  conflict-selector:
    title: "&8בחירת התנגשויות"
    size: 54
    filler-material: RED_STAINED_GLASS_PANE

  # ממשק מדריך כישופים (Enchantment Guide)
  guide:
    title: "&8מדריך כישופים"
    size: 54
    filler-material: LIGHT_BLUE_STAINED_GLASS_PANE

  # ממשק סדן (Custom Anvil)
  anvil:
    title: "&8⚒ Anvil"
    size: 54
    filler-material: GRAY_STAINED_GLASS_PANE

  # הגדרות פריטי GUI (Button Customization)
